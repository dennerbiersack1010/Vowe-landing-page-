<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOWE – Uma nova forma de voar.</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: #0d1520;
      color: #fff;
      overflow-x: hidden;
    }

    /* HERO */
    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 600px;
      display: flex;
      flex-direction: column;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      background-image: url('/images/hero-aviao.PNG');
      background-size: cover;
      background-position: center right;
      z-index: 0;
    }
    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(13,21,32,0.78) 35%, rgba(13,21,32,0.08) 100%);
    }

    /* NAVBAR */
    .navbar {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: #fff;
    }
    .logo-icon { width: 36px; height: 36px; }
    .logo-text {
      font-size: 17px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    /* Nav pill desktop */
    .nav-links {
      display: flex;
      align-items: center;
      list-style: none;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      padding: 10px 8px;
    }
    .nav-links li a {
      display: block;
      color: rgba(255,255,255,0.82);
      text-decoration: none;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.01em;
      padding: 6px 22px;
      border-radius: 999px;
      transition: background 0.18s, color 0.18s;
    }
    .nav-links li a:hover,
    .nav-links li a.active {
      background: rgba(255,255,255,0.10);
      color: #fff;
    }

    /* Flags desktop */
    .flags {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .flag {
      width: 28px;
      height: 20px;
      border-radius: 3px;
      overflow: hidden;
      cursor: pointer;
      opacity: 0.85;
      transition: opacity 0.15s;
    }
    .flag:hover { opacity: 1; }

    /* Flags inline no nav mobile */
    .flags-nav-mobile {
      display: none;
      align-items: center;
      gap: 8px;
    }
    .flags-nav-mobile .flag { width: 26px; height: 18px; }

    /* Hamburger */
    .hamburger {
      display: none;
      background: rgba(255,255,255,0.10);
      border: none;
      border-radius: 12px;
      width: 46px;
      height: 46px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 5px;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 2px;
      background: #fff;
      border-radius: 2px;
    }

    /* Mobile menu dropdown */
    .mobile-menu {
      display: none;
      position: absolute;
      top: 73px;
      left: 0; right: 0;
      background: rgba(13,21,32,0.97);
      z-index: 20;
      padding: 20px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .mobile-menu.open { display: block; }
    .mobile-menu ul { list-style: none; display: flex; flex-direction: column; }
    .mobile-menu ul li a {
      display: block;
      color: rgba(255,255,255,0.80);
      text-decoration: none;
      font-size: 16px;
      padding: 14px 28px;
      letter-spacing: 0.02em;
      transition: color 0.15s;
    }
    .mobile-menu ul li a:hover { color: #fff; }

    /* HERO CONTENT */
    .hero-content {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 56px 60px;
      max-width: 640px;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 20px;
    }

    .headline {
      font-size: clamp(52px, 6vw, 80px);
      font-weight: 300;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: #fff;
      margin-bottom: 18px;
    }

    .subline {
      font-size: 17px;
      font-weight: 300;
      color: rgba(255,255,255,0.65);
      margin-bottom: 36px;
    }

    /* CTA glassmorphism */
    .cta {
      display: inline-flex;
      align-items: center;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.28);
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
      padding: 6px 6px 6px 28px;
      font-size: 14px;
      font-weight: 400;
      letter-spacing: 0.01em;
      width: fit-content;
      transition: background 0.2s, border-color 0.2s;
    }
    .cta:hover {
      background: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.42);
    }
    .cta-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.30);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      margin-left: 18px;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .cta:hover .cta-arrow { background: rgba(255,255,255,0.28); }
    .cta-arrow svg { width: 16px; height: 16px; }

    /* MOBILE */
    @media (max-width: 767px) {
      .hero { min-height: 100svh; }

      .hero-bg {
        background-image: url('/images/hero-mobile.PNG');
        background-position: center center;
      }
      .hero-bg::after {
        background: linear-gradient(to bottom, rgba(13,21,32,0.50) 0%, rgba(13,21,32,0.08) 50%, rgba(13,21,32,0.55) 100%);
      }

      .navbar { padding: 16px 20px; }
      .nav-links { display: none; }
      .flags { display: none; }
      .flags-nav-mobile { display: flex; }
      .hamburger { display: flex; }

      .hero-content {
        padding: 44px 24px 40px;
        max-width: 100%;
        align-items: center;
        text-align: center;
        justify-content: flex-start;
      }
      .eyebrow { font-size: 11px; letter-spacing: 0.20em; margin-bottom: 16px; }
      .headline { font-size: clamp(46px, 12vw, 68px); margin-bottom: 14px; }
      .subline { font-size: 15px; margin-bottom: 28px; }
    }
  </style>
</head>
<body>

<section class="hero">
  <div class="hero-bg"></div>

  <nav class="navbar">
    <!-- Logo — substitua pelo arquivo real -->
    <a href="#" class="logo">
      <svg class="logo-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 8 L12 30 L20 14 L28 30 L36 8" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M8 8 L16 26 L20 18 L24 26 L32 8" stroke="white" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.45"/>
      </svg>
      <span class="logo-text">VOWE</span>
    </a>

    <!-- Nav links desktop -->
    <ul class="nav-links">
      <li><a href="#" class="active">Home</a></li>
      <li><a href="#">Sobre</a></li>
      <li><a href="#">Programas</a></li>
      <li><a href="#">Frota</a></li>
      <li><a href="#">News</a></li>
      <li><a href="#">Contato</a></li>
    </ul>

    <!-- Flags desktop -->
    <div class="flags">
      <div class="flag" title="Português">
        <svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg"><rect width="28" height="20" fill="#009C3B"/><polygon points="14,2 26,10 14,18 2,10" fill="#FEDF00"/><circle cx="14" cy="10" r="5" fill="#002776"/><path d="M9.5 10 Q14 7.5 18.5 10" stroke="white" stroke-width="0.8" fill="none"/></svg>
      </div>
      <div class="flag" title="English">
        <svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg"><rect width="28" height="20" fill="#B22234"/><rect y="1.54" width="28" height="1.54" fill="white"/><rect y="4.61" width="28" height="1.54" fill="white"/><rect y="7.69" width="28" height="1.54" fill="white"/><rect y="10.77" width="28" height="1.54" fill="white"/><rect y="13.85" width="28" height="1.54" fill="white"/><rect y="16.92" width="28" height="1.54" fill="white"/><rect width="11.2" height="10.77" fill="#3C3B6E"/><g fill="white"><circle cx="1.4" cy="1.4" r="0.7"/><circle cx="3.73" cy="1.4" r="0.7"/><circle cx="6.07" cy="1.4" r="0.7"/><circle cx="8.4" cy="1.4" r="0.7"/><circle cx="10.73" cy="1.4" r="0.7"/><circle cx="2.57" cy="2.77" r="0.7"/><circle cx="4.9" cy="2.77" r="0.7"/><circle cx="7.23" cy="2.77" r="0.7"/><circle cx="9.57" cy="2.77" r="0.7"/><circle cx="1.4" cy="4.15" r="0.7"/><circle cx="3.73" cy="4.15" r="0.7"/><circle cx="6.07" cy="4.15" r="0.7"/><circle cx="8.4" cy="4.15" r="0.7"/><circle cx="10.73" cy="4.15" r="0.7"/><circle cx="2.57" cy="5.54" r="0.7"/><circle cx="4.9" cy="5.54" r="0.7"/><circle cx="7.23" cy="5.54" r="0.7"/><circle cx="9.57" cy="5.54" r="0.7"/><circle cx="1.4" cy="6.92" r="0.7"/><circle cx="3.73" cy="6.92" r="0.7"/><circle cx="6.07" cy="6.92" r="0.7"/><circle cx="8.4" cy="6.92" r="0.7"/><circle cx="10.73" cy="6.92" r="0.7"/><circle cx="2.57" cy="8.31" r="0.7"/><circle cx="4.9" cy="8.31" r="0.7"/><circle cx="7.23" cy="8.31" r="0.7"/><circle cx="9.57" cy="8.31" r="0.7"/></g></svg>
      </div>
      <div class="flag" title="Español">
        <svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg"><rect width="28" height="20" fill="#c60b1e"/><rect y="5" width="28" height="10" fill="#ffc400"/></svg>
      </div>
    </div>

    <!-- Flags mobile inline no nav -->
    <div class="flags-nav-mobile">
      <div class="flag" title="Português">
        <svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg"><rect width="28" height="20" fill="#009C3B"/><polygon points="14,2 26,10 14,18 2,10" fill="#FEDF00"/><circle cx="14" cy="10" r="5" fill="#002776"/></svg>
      </div>
      <div class="flag" title="English">
        <svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg"><rect width="28" height="20" fill="#B22234"/><rect y="1.54" width="28" height="1.54" fill="white"/><rect y="4.61" width="28" height="1.54" fill="white"/><rect y="7.69" width="28" height="1.54" fill="white"/><rect y="10.77" width="28" height="1.54" fill="white"/><rect y="13.85" width="28" height="1.54" fill="white"/><rect width="11.2" height="10.77" fill="#3C3B6E"/></svg>
      </div>
      <div class="flag" title="Español">
        <svg viewBox="0 0 28 20" xmlns="http://www.w3.org/2000/svg"><rect width="28" height="20" fill="#c60b1e"/><rect y="5" width="28" height="10" fill="#ffc400"/></svg>
      </div>
    </div>

    <!-- Hamburger -->
    <button class="hamburger" id="hamburger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- Mobile menu dropdown -->
  <div class="mobile-menu" id="mobileMenu">
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Sobre</a></li>
      <li><a href="#">Programas</a></li>
      <li><a href="#">Frota</a></li>
      <li><a href="#">News</a></li>
      <li><a href="#">Contato</a></li>
    </ul>
  </div>

  <!-- Hero content -->
  <div class="hero-content">
    <p class="eyebrow">Built to inspire</p>
    <h1 class="headline">uma nova<br>forma de voar.</h1>
    <p class="subline">seja membro e voe uma frota.</p>
    <a href="#" class="cta">
      torne-se membro vowe
      <span class="cta-arrow">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 8H13M13 8L8.5 3.5M13 8L8.5 12.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
    </a>
  </div>
</section>

<script>
  const hamburger = document.getElementById('hamburger');
  const mobileMenu = document.getElementById('mobileMenu');
  hamburger.addEventListener('click', () => mobileMenu.classList.toggle('open'));
  mobileMenu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => mobileMenu.classList.remove('open')));
</script>

</body>
</html>
